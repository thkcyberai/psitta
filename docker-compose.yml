# ══════════════════════════════════════════════════════════════════════
# Psitta — Docker Compose Development Stack
#
# Start everything:  docker compose up -d
# Start infra only:  docker compose up -d postgres redis minio
# Run migrations:    docker compose --profile migrate up migrate
# View logs:         docker compose logs -f api worker
# ══════════════════════════════════════════════════════════════════════

name: psitta

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: psitta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-psitta}
      POSTGRES_USER: ${DATABASE_USER:-psitta}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-psitta_dev_password}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - psitta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-psitta} -d ${DATABASE_NAME:-psitta}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: psitta-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - psitta-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes

  # ── MinIO (S3-compatible) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: psitta-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - psitta-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: server /data --console-address ":9001"

  # ── MinIO Bucket Initialization ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: psitta-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set psitta http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb psitta/${S3_BUCKET_NAME:-psitta-storage} --ignore-existing;
      mc anonymous set none psitta/${S3_BUCKET_NAME:-psitta-storage};
      echo 'Bucket ready';
      "
    profiles: ["init"]

  # ── Alembic Migrations ─────────────────────────────────────────────
  migrate:
    build:
      context: ./core/backend
      target: builder
    container_name: psitta-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-psitta}
      POSTGRES_USER: ${POSTGRES_USER:-psitta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psitta_dev_password}
    command: alembic -c alembic.ini upgrade head
    profiles: ["migrate"]

  # ── API Server ─────────────────────────────────────────────────────
  api:
    build:
      context: ./core/backend
      target: runtime
    container_name: psitta-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
    command: >
      uvicorn psitta.main:create_app
      --factory
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level ${LOG_LEVEL:-debug}
    volumes:
      - ./core/backend/src:/app/src:ro
      - psitta-audio-cache:/app/audio_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Document Processing Worker ─────────────────────────────────────
  worker:
    build:
      context: ./core/backend
      target: runtime
    container_name: psitta-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
    command: python -m psitta.workers.document_processor

volumes:
  psitta-audio-cache:
  psitta-pgdata:
    driver: local
  psitta-redis:
    driver: local
  psitta-minio:
    driver: local
