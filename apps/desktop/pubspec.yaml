name: psitta
description: "Ultra-natural document narration. Listen to any document."
publish_to: "none"
version: 1.1.1+0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Routing (supports shell routes for desktop layout)
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  url_launcher: ^6.3.0             # Opens Stripe Checkout in system browser

  # Authentication (Auth0)
  auth0_flutter: ^1.7.0
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  webview_windows: ^0.4.0

  # Audio playback
  just_audio: ^0.9.39
  shared_preferences: ^2.2.0
  # Mic capture for Whispers. flutter_recorder (miniaudio/FFI, WASAPI on
  # Windows) replaced the `record` plugin, whose Windows MediaFoundation backend
  # is broken: record_windows 2.1.0 deadlocks the UI thread on stop() and 2.2.0
  # never writes the WAV file. flutter_recorder records 16-bit PCM WAV directly.
  flutter_recorder: ^1.1.4

  # Desktop-specific
  desktop_drop: ^0.4.4            # Drag & drop file upload
  window_manager: ^0.4.2          # Window size, title bar, positioning
  hotkey_manager: ^0.2.3          # Global keyboard shortcuts

  # Code generation annotations
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Rich text editing
  flutter_quill: ^11.5.1

  # PDF viewing
  pdfrx: ^2.4.4

  # SVG rendering
  flutter_svg: ^2.0.10

  # Crypto (PKCE code challenge)
  crypto: ^3.0.0

  # Utilities
  path: ^1.9.0
  path_provider: ^2.1.5
  file_picker: ^8.0.0
  just_audio_windows: ^0.2.2
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0
  mocktail: ^1.0.0
  msix: ^3.16.7
  golden_toolkit: ^0.15.0

dependency_overrides:
  # quill_native_bridge_windows 0.0.2 (still the version quill 11.x resolves to)
  # references the win32 top-level GMEM_MOVEABLE constant, which win32 5.x removed.
  # Local copy patches it to GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE. Confirmed still
  # required after the Flutter 3.44 / quill 11.x upgrade (GMEM build error
  # resurfaced without it).
  quill_native_bridge_windows:
    path: local_overrides/quill_native_bridge_windows

msix_config:
  display_name: Psitta
  publisher_display_name: Facti AI LLC
  identity_name: com.factiai.psitta
  msix_version: 1.1.1.0
  description: "Reading to Listening - ultra-natural document narration"
  publisher: "CN=Facti AI LLC, O=Facti AI LLC, L=Colorado Springs, S=Colorado, C=US"
  sign_msix: false
  logo_path: assets/branding/psitta-bird-tight.png
  capabilities: internetClient, privateNetworkClientServer
  languages: en-us
  certificate_path: psitta-dev.pfx
  certificate_password: psitta-dev-2026
  install_certificate: false

flutter:
  uses-material-design: true
  assets:
    - assets/branding/psitta-bird.png
    - assets/branding/psitta-horizontal.png
    - assets/branding/psitta-horizontal-dark.png
    - assets/illustrations/
    - assets/covers/
    - assets/branding/voice_avatars/
    - assets/dictionaries/
