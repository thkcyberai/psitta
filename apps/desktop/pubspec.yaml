name: psitta
description: "Ultra-natural document narration. Listen to any document."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Routing (supports shell routes for desktop layout)
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Authentication (Auth0)
  auth0_flutter: ^1.7.0
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  webview_windows: ^0.4.0

  # Audio playback
  just_audio: ^0.9.39
  shared_preferences: ^2.2.0

  # Desktop-specific
  desktop_drop: ^0.4.4            # Drag & drop file upload
  window_manager: ^0.4.2          # Window size, title bar, positioning
  hotkey_manager: ^0.2.3          # Global keyboard shortcuts

  # Code generation annotations
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Rich text editing
  flutter_quill: ^10.8.4

  # PDF viewing
  pdfrx: ^1.0.101

  # SVG rendering
  flutter_svg: ^2.0.10

  # Crypto (PKCE code challenge)
  crypto: ^3.0.0

  # Utilities
  path: ^1.9.0
  path_provider: ^2.1.5
  file_picker: ^8.0.0
  just_audio_windows: ^0.2.2
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0
  mocktail: ^1.0.0
  msix: ^3.16.7

dependency_overrides:
  # quill_native_bridge_windows 0.0.2 uses removed top-level GMEM_MOVEABLE constant.
  # Local copy patches it to GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE for win32 5.x compat.
  quill_native_bridge_windows:
    path: local_overrides/quill_native_bridge_windows

msix_config:
  display_name: Psitta
  publisher_display_name: Facti AI LLC
  identity_name: com.factiai.psitta
  msix_version: 1.0.2.0
  description: "Reading to Listening - ultra-natural document narration"
  publisher: CN=Facti AI LLC
  logo_path: assets/branding/OnlyBird.png
  capabilities: internetClient, privateNetworkClientServer
  languages: en-us
  certificate_path: psitta-dev.pfx
  certificate_password: psitta-dev-2026
  install_certificate: false

flutter:
  uses-material-design: true
  assets:
    - assets/branding/Logo.png
    - assets/illustrations/
