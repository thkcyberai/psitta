name: Feature Request
description: Suggest a new feature
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem Statement }
    validations: { required: true }
  - type: textarea
    id: solution
    attributes: { label: Proposed Solution }
    validations: { required: true }
  - type: dropdown
    id: boundary
    attributes:
      label: Open-Core Placement
      options: [Core (Apache 2.0), Extension (Commercial), Not sure]
    validations: { required: true }
