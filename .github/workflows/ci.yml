# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Psitta — Continuous Integration                                 ║
# ║  Runs on every push and PR to main/develop                          ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.24.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  security-events: write    # For CodeQL / SARIF uploads

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Backend — Lint & Type-Check
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend-lint:
    name: "Backend · Lint & Types"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: MyPy type check
        run: mypy src/psitta --ignore-missing-imports

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Backend — Unit & Integration Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend-test:
    name: "Backend · Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: core/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: psitta_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/psitta_test"
      REDIS_URL: "redis://localhost:6379/0"
      ENVIRONMENT: testing
      SECRET_KEY: test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        run: alembic -c src/psitta/db/alembic.ini upgrade head

      - name: Run unit tests
        run: |
          pytest tests/unit \
            --cov=psitta \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --junitxml=junit-unit.xml \
            -v --tb=short

      - name: Run integration tests
        run: |
          pytest tests/integration \
            --cov=psitta \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --junitxml=junit-integration.xml \
            -v --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            core/backend/coverage-*.xml
            core/backend/junit-*.xml

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Backend — Security Scan
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend-security:
    name: "Backend · Security"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Bandit security scan
        run: |
          bandit -r src/psitta \
            -f json -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            || true

      - name: pip-audit dependency scan
        run: pip-audit --strict --desc on

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: core/backend
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-backend

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Flutter — Analyze & Test
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  flutter-check:
    name: "Flutter · Analyze & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: dart analyze --fatal-infos

      - name: Dart format check
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: flutter test --coverage --reporter=json > test-results.json

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: apps/mobile/coverage/lcov.info

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Docker — Build & Scan
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  docker-build:
    name: "Docker · Build & Scan"
    runs-on: ubuntu-latest
    needs: [backend-test, backend-security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./core/backend
          push: false
          load: true
          tags: psitta-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: psitta-api:test
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Migration Check — Verify Alembic heads
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  migration-check:
    name: "DB · Migration Integrity"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: psitta_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/psitta_test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check single Alembic head
        run: |
          heads=$(alembic -c src/psitta/db/alembic.ini heads 2>&1 | grep -c "head")
          if [ "$heads" -gt 1 ]; then
            echo "::error::Multiple Alembic heads detected — merge required"
            alembic -c src/psitta/db/alembic.ini heads
            exit 1
          fi

      - name: Verify upgrade/downgrade cycle
        run: |
          alembic -c src/psitta/db/alembic.ini upgrade head
          alembic -c src/psitta/db/alembic.ini downgrade base
          alembic -c src/psitta/db/alembic.ini upgrade head
          echo "✓ Migration cycle verified"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Gate — All checks must pass
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ci-gate:
    name: "CI Gate ✓"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-lint
      - backend-test
      - backend-security
      - flutter-check
      - docker-build
      - migration-check
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
