# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Psitta — Security Scan (Nightly)                                ║
# ║  Dependency audit + container scan on schedule                      ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Security Scan

on:
  schedule:
    - cron: "30 3 * * *"     # 03:30 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: "Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend deps
        working-directory: core/backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pip-audit
        working-directory: core/backend
        run: pip-audit --strict --desc on --output pip-audit.json --format json
        continue-on-error: true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: core/backend/pip-audit.json

  container-scan:
    name: "Container Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t psitta-api:scan ./core/backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: psitta-api:scan
          format: sarif
          output: trivy-nightly.sarif
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-nightly.sarif
          category: trivy-nightly
