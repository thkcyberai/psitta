# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Psitta — Release & Deploy                                       ║
# ║  Triggered on version tags (v*) or manual dispatch                  ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test suite (emergency hotfix only)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/psitta

permissions:
  contents: write        # For release creation
  packages: write        # For GHCR push
  id-token: write        # For OIDC attestation

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Determine version & environment
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  meta:
    name: "Release Metadata"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      environment: ${{ steps.env.outputs.environment }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "📦 Version: $version"

      - name: Determine environment
        id: env
        run: |
          if [[ -n "${{ inputs.environment }}" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.version.outputs.is_prerelease }}" == "true" ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Run CI (unless explicitly skipped for hotfix)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ci:
    name: "Validate"
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Build & Push Docker images
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-push:
    name: "Build & Push"
    runs-on: ubuntu-latest
    needs: [meta, ci]
    if: |
      always() &&
      needs.meta.result == 'success' &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    strategy:
      matrix:
        component:
          - name: api
            context: ./core/backend
            dockerfile: ./core/backend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.meta.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.meta.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ needs.meta.outputs.is_prerelease == 'false' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ needs.meta.outputs.version }}
            BUILD_SHA=${{ github.sha }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Database Migration
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  migrate:
    name: "Migrate DB (${{ needs.meta.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [meta, build-push]
    environment: ${{ needs.meta.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        run: |
          echo "🗃️  Running Alembic migrations against ${{ needs.meta.outputs.environment }}"
          echo "    Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ needs.meta.outputs.version }}"
          # In real deployment, this runs:
          # docker run --rm \
          #   -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
          #   $IMAGE alembic upgrade head
          echo "⚠️  Placeholder — wire to your infrastructure (ECS RunTask / K8s Job / SSH)"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Deploy
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    name: "Deploy → ${{ needs.meta.outputs.environment }}"
    runs-on: ubuntu-latest
    needs: [meta, migrate]
    environment:
      name: ${{ needs.meta.outputs.environment }}
      url: ${{ needs.meta.outputs.environment == 'production' && 'https://api.psitta.io' || 'https://staging-api.psitta.io' }}
    steps:
      - name: Deploy notification
        run: |
          echo "🚀 Deploying Psitta v${{ needs.meta.outputs.version }}"
          echo "   Environment: ${{ needs.meta.outputs.environment }}"
          echo "   Commit:      ${{ github.sha }}"
          echo ""
          echo "⚠️  Wire this step to your deployment target:"
          echo "   - AWS ECS: update service with new task definition"
          echo "   - Kubernetes: kubectl set image / helm upgrade"
          echo "   - Fly.io: fly deploy --image ..."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GitHub Release
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  release:
    name: "Create Release"
    runs-on: ubuntu-latest
    needs: [meta, deploy]
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$prev_tag" ]; then
            prev_tag=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          git log --pretty=format:"- %s (%h)" "$prev_tag"..HEAD >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev_tag...v${{ needs.meta.outputs.version }}" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.meta.outputs.version }}
          name: "Psitta v${{ needs.meta.outputs.version }}"
          body_path: changelog.md
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
