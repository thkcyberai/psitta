# ══════════════════════════════════════════════════════════════════════
# Psitta — Production Docker Compose Overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f compose.prod.yml up -d
#
# This file overrides development defaults with production settings:
#   - No source volume mounts (baked into image)
#   - No --reload flag
#   - Resource limits enforced
#   - Restart policies hardened
#   - Debug logging disabled
#   - Health check intervals tightened
# ══════════════════════════════════════════════════════════════════════

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  minio:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  api:
    restart: always
    command: >
      uvicorn psitta.main:create_app
      --factory
      --host 0.0.0.0
      --port 8000
      --workers 4
      --log-level warning
      --access-log
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      replicas: 2
    healthcheck:
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    restart: always
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      replicas: 2
